name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    name: GHC ${{ matrix.ghc }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ghc: ["9.4", "9.6", "9.8", "9.10"]

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: latest

      - name: Configure
        run: cabal configure --enable-tests

      - name: Freeze
        run: cabal freeze

      - name: Cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ runner.os }}-ghc-${{ matrix.ghc }}-${{ hashFiles('cabal.project.freeze') }}
          restore-keys: ${{ runner.os }}-ghc-${{ matrix.ghc }}-

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=always
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8

      - name: Build source distribution
        if: startsWith(github.ref, 'refs/tags/v') && matrix.ghc == '9.10'
        run: cabal sdist

      - name: Upload sdist artifact
        if: startsWith(github.ref, 'refs/tags/v') && matrix.ghc == '9.10'
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist-newstyle/sdist/*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: false
          body_path: CHANGELOG.md
